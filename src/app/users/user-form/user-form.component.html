<section class="user-page">
  <div class="user-card">

    <div class="user-head">
      <span class="eyebrow">👤 Compte</span>
      <h2>Create your account</h2>
      <p class="muted">Join the community and start sharing your suggestions.</p>
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="name">Name</label>
        <input id="name" formControlName="name" type="text" placeholder="Your full name" />
        <div class="error" *ngIf="name?.invalid && name?.touched">
          <span *ngIf="name?.errors?.['required']">⚠ Name is required.</span>
          <span *ngIf="name?.errors?.['maxlength']">⚠ Name is too long.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" formControlName="email" type="text" placeholder="you@example.com" />
        <div class="error" *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched">
          ⚠ Le format de l'email est incorrect
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" formControlName="password" type="password" placeholder="••••••••" />
        <div class="error" *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched">
          ⚠ Le mot de passe doit faire au minimum 6 caractères
        </div>
      </div>

      <button [disabled]="userForm.invalid" type="submit" class="submit-btn">
        ✨ Submit
      </button>
    </form>
  </div>
</section>
